<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PromptCraft — Redirection...</title>
<style>
body { font-family:'Instrument Sans',sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f7f4ef; flex-direction:column; gap:1rem; }
p { color:#8a857d; font-size:.9rem; }
.logo { font-family:serif; font-size:1.2rem; color:#1a1612; font-weight:700; }
.logo span { color:#e8740c; }
.spinner { width:28px;height:28px;border:3px solid #e2ddd6;border-top-color:#e8740c;border-radius:50%;animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.hint { font-size:.75rem; color:#aaa; font-family:monospace; }
</style>
</head>
<body>
<div class="logo">Prompt<span>Craft</span></div>
<div class="spinner"></div>
<p>Ouverture en cours...</p>
<p class="hint">Le prompt est copié — collez avec Ctrl+V</p>
<script>
const params = new URLSearchParams(window.location.search);
const prompt = params.get('prompt') || '';
const target = params.get('target') || 'deepseek';
const urls = {
  deepseek: 'https://chat.deepseek.com/',
  gemini:   'https://gemini.google.com/app',
};
if (prompt) {
  navigator.clipboard.writeText(prompt).then(() => {
    setTimeout(() => { window.location.href = urls[target] || urls.deepseek; }, 800);
  }).catch(() => {
    window.location.href = urls[target] || urls.deepseek;
  });
} else {
  window.location.href = urls[target] || urls.deepseek;
}
</script>
</body>
</html>
