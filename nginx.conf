# =============================================================================
# Fichier : nginx.conf
# Rôle    : Configuration Nginx pour servir le frontend
#           et rediriger les appels API vers le backend
# Auteur  : DIAWANE Ramatoulaye
# =============================================================================

server {
    listen 80;
    # Nginx écoute sur le port 80 à l'intérieur du conteneur

    server_name localhost;
    # Nom du serveur — localhost en développement

    root /usr/share/nginx/html;
    # Dossier racine des fichiers statiques
    # Correspond au volume monté : ./front → /usr/share/nginx/html

    index index.html;
    # Fichier servi par défaut à la racine

    # ── Fichiers statiques (frontend) ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # Cherche le fichier demandé
        # Si pas trouvé → sert index.html (SPA behavior)
    }

    # ── Proxy vers le backend FastAPI ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000/;
        # Redirige /api/xxx vers http://backend:8000/xxx
        # "backend" = nom du service Docker Compose
        # Exemple : /api/generate-prompt → http://backend:8000/generate-prompt

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Passe l'IP réelle du client au backend
        # Nécessaire pour que le rate limiting fonctionne correctement

        proxy_read_timeout 120s;
        # Timeout de 2 minutes — nécessaire car LangGraph peut prendre du temps
    }

    # ── Sécurité : headers HTTP ────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    # Empêche votre site d'être chargé dans une iframe d'un autre site
    # Protection contre le clickjacking

    add_header X-Content-Type-Options "nosniff";
    # Empêche le navigateur de deviner le type de fichier
    # Protection contre les attaques MIME type sniffing

    add_header X-XSS-Protection "1; mode=block";
    # Active la protection XSS du navigateur

    # ── Compression gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    # Compresse les réponses → page plus rapide à charger
}